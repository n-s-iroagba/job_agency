<main class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden">
<!-- Abstract Background Elements for 'Smooth Tech' Aesthetic -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none overflow-hidden -z-10">
<div class="absolute -top-[10%] -right-[5%] w-[40%] h-[60%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -left-[5%] w-[35%] h-[50%] bg-secondary-container/30 rounded-full blur-[100px]"></div>
</div>
<div class="w-full max-w-md">
<!-- Branding Header -->
<div class="text-center mb-10">
<h1 class="text-2xl font-bold tracking-tight text-on-surface flex items-center justify-center gap-2">
<span class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined text-sm" data-weight="fill" style="font-variation-settings: 'FILL' 1;">work</span>
</span>
                    JobNexa
                </h1>
<p class="text-on-surface-variant mt-2 font-medium tracking-tight">Precision in Professionalism.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest p-8 md:p-10 rounded-xl shadow-[0_20px_40px_rgba(25,28,30,0.06)]">
<h2 class="text-xl font-semibold mb-8 text-center text-on-surface">Welcome back</h2>
<!-- SSO Section -->
<div class="space-y-4">
<button class="w-full flex items-center justify-center gap-3 px-6 py-3 bg-surface-container-low hover:bg-surface-container-high transition-all duration-300 rounded-lg group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>

<span class="font-medium text-on-surface group-active:scale-95 transition-transform">Sign in with Google</span>
</button>
</div>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-3 bg-surface-container-lowest text-on-surface-variant font-medium">Or continue with email</span>
</div>
</div>
<!-- Form Section -->
<form class="space-y-6">
<div>
<label class="block text-xs font-bold text-on-surface-variant tracking-wider uppercase mb-2" for="email">Email address</label>
<input class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all placeholder:text-outline outline-none" id="email" placeholder="name@company.com" type="email"/>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="block text-xs font-bold text-on-surface-variant tracking-wider uppercase" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/40 focus:bg-surface-container-lowest transition-all placeholder:text-outline outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -tranblue-y-1/2 text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-white font-bold rounded-lg shadow-lg hover:shadow-primary/20 active:scale-[0.98] transition-all duration-200" type="submit">
                        Sign In
                    </button>
</form>
<div class="mt-8 pt-6 text-center">
<p class="text-sm text-on-surface-variant">
                        Don't have an account? 
                        <a class="font-bold text-primary hover:text-primary-container transition-colors" href="#">Create an account</a>
</p>
</div>
</div>
<!-- Trust Indicators -->
<div class="mt-10 flex flex-wrap justify-center gap-x-8 gap-y-3 opacity-60">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">lock</span>
<span class="text-xs font-medium uppercase tracking-widest">Securely Encrypted</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span class="text-xs font-medium uppercase tracking-widest">GDPR Compliant</span>
</div>
</div>
</div>

<div class="flex gap-8">

<a class="text-sm font-medium text-blue-500 hover:text-blue-600 transition-colors" href="#">Terms of Service</a>
<a class="text-sm font-medium text-blue-500 hover:text-blue-600 transition-colors" href="#">Cookie Settings</a>
</div>
</div>
